name: Backport to develop

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  backport:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cherry-pick commits a branch de backport
        id: backport
        run: |
          BACKPORT_BRANCH="backport/${{ github.event.pull_request.number }}-to-develop"
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          git fetch origin develop || echo "develop no existe aún"
          git checkout -b $BACKPORT_BRANCH origin/develop 2>/dev/null || git checkout -b $BACKPORT_BRANCH origin/master

          if git cherry-pick --no-merges $BASE..$HEAD; then
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            # Commitear el estado con conflict markers para que haya diff
            git add -A
            git commit -m "backport: cherry-pick con conflictos — revisión manual requerida"
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

          git push origin $BACKPORT_BRANCH
          echo "branch=$BACKPORT_BRANCH" >> $GITHUB_OUTPUT

      - name: Crear PR de backport
        uses: actions/github-script@v7
        with:
          script: |
            const conflict = '${{ steps.backport.outputs.conflict }}' === 'true';
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Backport] ${{ github.event.pull_request.title }}`,
              head: `${{ steps.backport.outputs.branch }}`,
              base: 'develop',
              body: [
                `Backport automático del PR #${{ github.event.pull_request.number }} hacia \`develop\`.`,
                '',
                conflict
                  ? '⚠️ **Hubo conflictos durante el cherry-pick — revisión manual requerida.**'
                  : '✅ Cherry-pick aplicado sin conflictos. Revisión manual antes de mergear.',
              ].join('\n'),
            });
