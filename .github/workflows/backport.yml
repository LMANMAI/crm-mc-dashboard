name: Backport to develop

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  backport:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      workflows: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Crear branch de backport
        id: branch
        run: |
          BACKPORT_BRANCH="backport/${{ github.event.pull_request.number }}-to-develop"
          echo "name=$BACKPORT_BRANCH" >> $GITHUB_OUTPUT

          git fetch origin develop 2>/dev/null || true

          if git ls-remote --exit-code origin $BACKPORT_BRANCH > /dev/null 2>&1; then
            echo "Branch ya existe, reutilizando"
            git checkout -b $BACKPORT_BRANCH origin/$BACKPORT_BRANCH
          else
            git checkout -b $BACKPORT_BRANCH origin/develop 2>/dev/null \
              || git checkout -b $BACKPORT_BRANCH origin/master
          fi

      - name: Cherry-pick commits
        id: cherrypick
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          if git cherry-pick --no-merges $BASE..$HEAD; then
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            git add -A
            git commit -m "backport: cherry-pick con conflictos — revisión manual requerida"
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

          git push origin ${{ steps.branch.outputs.name }}

      - name: Crear PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.branch.outputs.name }}';
            const conflict = '${{ steps.cherrypick.outputs.conflict }}' === 'true';

            if (!branch) {
              core.setFailed('branch output vacío — revisar step anterior');
              return;
            }

            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'develop',
              state: 'open',
            });

            if (existing.length > 0) {
              console.log(`PR ya existe: ${existing[0].html_url}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Backport] ${{ github.event.pull_request.title }}`,
              head: branch,
              base: 'develop',
              body: [
                `Backport automático del PR #${{ github.event.pull_request.number }} hacia \`develop\`.`,
                '',
                conflict
                  ? '⚠️ **Hubo conflictos durante el cherry-pick — revisión manual requerida.**'
                  : '✅ Cherry-pick aplicado sin conflictos. Revisión manual antes de mergear.',
              ].join('\n'),
            });

            console.log(`PR creado: ${pr.data.html_url}`);
